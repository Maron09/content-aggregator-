services:
  - type: web
    name: content-aggregator
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium && apt-get install -y ffmpeg
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: RESULTS_DIR
        value: results
      - key: DOWNLOADS_DIR
        value: downloads